<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe simple game</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1> Tic Tac Toe Game</h1>
        <br>
        <div>
            <p> Click To start the Game !!!</p>
            <form>
                <label for="Player_1_name">Player 1: </label>
                <input type="text" class="Player_1" name="Player_1_name_in" placeholder="Name Please!" required>
                <label for="Player_2_name">Player 2: </label>
                <input type="text" class="Player_2" name="Player_2_name_in" placeholder="Name Please!" required>
                <br>
                <button class="Start_btn"> Start Game !</button>
            </form>
            
        </div>
        <table class="ttt_table">
            <tr>
                <td class="btn1"> <button class="grid"></button> </td>
                <td class="btn2"> <button class="grid"> </button> </td>
                <td class="btn3"> <button class="grid"> </button> </td>
            </tr>
            <tr>
                <td class="btn4"> <button class="grid"> </button>  </td>
                <td class="btn5"> <button class="grid"> </button>  </td>
                <td class="btn6"> <button class="grid"> </button>  </td>
            </tr>
            <tr>
                <td class="btn7"> <button class="grid"> </button>  </td>
                <td class="btn8"> <button class="grid"> </button>  </td>
                <td class="btn9"> <button class="grid"> </button>  </td>
            </tr>
        </table>
        <script src="main.js"> </script>
    </body>
</html>
